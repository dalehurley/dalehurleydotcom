<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Claude PHP SDK logo">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#2d1b69"/>

  <!-- PHP hexagon -->
  <polygon points="256,56 432,158 432,354 256,456 80,354 80,158" fill="#4c3599"/>
  <polygon points="256,56 432,158 432,354 256,456 80,354 80,158" fill="none" stroke="#a78bfa" stroke-width="10"/>

  <!-- PHP text -->
  <text x="256" y="305" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="110" fill="white">PHP</text>

  <!-- SDK badge -->
  <rect x="148" y="384" width="216" height="58" rx="14" fill="#FF750F"/>
  <text x="256" y="425" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="36" fill="white" letter-spacing="4">SDK</text>

  <!-- Stars indicator (subtle) -->
  <text x="256" y="44" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#fbbf24" letter-spacing="2">★ ★ ★</text>
</svg>
