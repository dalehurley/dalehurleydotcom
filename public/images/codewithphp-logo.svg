<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="CodeWithPHP logo">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#4B0600"/>

  <!-- Orange accent border ring -->
  <rect x="18" y="18" width="476" height="476" rx="66" fill="none" stroke="#FF750F" stroke-width="10" opacity=".5"/>

  <!-- Code brackets — main visual -->
  <text x="60" y="310" font-family="'Courier New', monospace" font-weight="900" font-size="240" fill="white" opacity=".12">&lt;/&gt;</text>
  <text x="60" y="310" font-family="'Courier New', monospace" font-weight="900" font-size="240" fill="white" opacity=".95">&lt;/&gt;</text>

  <!-- PHP label strip at bottom -->
  <rect x="52" y="368" width="408" height="90" rx="20" fill="#FF750F"/>
  <text x="256" y="438" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="72" fill="white">PHP</text>

  <!-- Subtle learn spark top-right -->
  <text x="418" y="100" font-family="sans-serif" font-size="56" fill="#FF750F" opacity=".7">✦</text>
</svg>
