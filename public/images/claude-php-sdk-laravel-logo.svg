<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Claude PHP SDK for Laravel logo">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a0808"/>

  <!-- Laravel glow -->
  <circle cx="200" cy="256" r="220" fill="#ef4444" opacity=".08"/>

  <!-- Bold Laravel "L" -->
  <rect x="88" y="96" width="56" height="296" rx="14" fill="#ef4444"/>
  <rect x="88" y="352" width="188" height="56" rx="14" fill="#ef4444"/>

  <!-- PHP badge (right side) -->
  <rect x="258" y="232" width="182" height="88" rx="18" fill="#777bb4"/>
  <text x="349" y="294" text-anchor="middle" font-family="'Courier New', monospace" font-weight="900" font-size="62" fill="white">PHP</text>

  <!-- "+" connector -->
  <text x="244" y="290" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="52" fill="#6b7280">+</text>

  <!-- Laravel label -->
  <rect x="88" y="410" width="188" height="42" rx="10" fill="#ef4444" opacity=".7"/>
  <text x="182" y="440" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="22" fill="white" letter-spacing="1">LARAVEL</text>
</svg>
